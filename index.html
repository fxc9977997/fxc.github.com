<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>机电复合传动系统健康管理与故障诊断平台</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg0:#060a14;--bg1:#0a0e1a;--bg2:#111827;--bg3:#151d2e;--bg4:#1a2540;--bg5:#1f2f52;
  --bd:#1e2d4a;--bd2:#2a3f6a;
  --t1:#e8ecf4;--t2:#7b8ba5;--t3:#4a5568;
  --blue:#3b82f6;--cyan:#06b6d4;--green:#10b981;--yellow:#f59e0b;--red:#ef4444;--purple:#8b5cf6;--orange:#f97316;--teal:#14b8a6;
  --gb:linear-gradient(135deg,#3b82f6,#06b6d4);--gg:linear-gradient(135deg,#10b981,#34d399);--gr:linear-gradient(135deg,#ef4444,#f97316);--gy:linear-gradient(135deg,#f59e0b,#fbbf24);
  --r:12px;--rs:8px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg1);color:var(--t1);display:flex;flex-direction:column;font-size:12px;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px;}
button,select,input{font-family:inherit;cursor:pointer;}
select,input{background:var(--bg3);color:var(--t1);border:1px solid var(--bd);border-radius:6px;padding:5px 10px;font-size:11px;outline:none;}
select:focus,input:focus{border-color:var(--blue);}

.hdr{height:44px;background:linear-gradient(90deg,#0d1424,#111f3a,#0d1424);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0;position:relative;z-index:100;}
.hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--blue),transparent);opacity:.3;}
.logo{display:flex;align-items:center;gap:8px;}
.logo-i{width:24px;height:24px;background:var(--gb);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#fff;box-shadow:0 0 8px rgba(59,130,246,.3);}
.logo-t{font-size:12px;font-weight:700;letter-spacing:.5px;background:var(--gb);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hdr-c{display:flex;align-items:center;gap:10px;position:absolute;left:50%;transform:translateX(-50%);}
.hdr-st{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--t2);background:rgba(16,185,129,.08);padding:2px 8px;border-radius:14px;border:1px solid rgba(16,185,129,.12);}
.st-dot{width:5px;height:5px;background:var(--green);border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.4)}50%{box-shadow:0 0 0 4px rgba(16,185,129,0)}}
.hdr-time{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t2);}
.hdr-r{display:flex;align-items:center;gap:5px;}
.hdr-btn{background:none;border:1px solid var(--bd);color:var(--t2);padding:3px 8px;border-radius:5px;font-size:9px;transition:all .2s;}
.hdr-btn:hover{border-color:var(--blue);color:var(--blue);}
.alrt{position:relative;}.alrt::after{content:'3';position:absolute;top:-3px;right:-5px;width:12px;height:12px;background:var(--red);border-radius:50%;font-size:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;}
.ver-tag{font-size:8px;color:var(--t3);border:1px solid var(--bd);padding:1px 5px;border-radius:3px;}

.lay{display:flex;flex:1;overflow:hidden;}
.sb{width:185px;background:var(--bg2);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;}
.sb-s{padding:8px 7px 4px;}
.sb-l{font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);padding:0 6px;margin-bottom:4px;}
.ni{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:5px;cursor:pointer;transition:all .12s;font-size:10px;color:var(--t2);margin-bottom:1px;position:relative;user-select:none;}
.ni:hover{background:var(--bg3);color:var(--t1);}
.ni.act{background:rgba(59,130,246,.1);color:var(--blue);font-weight:500;}
.ni.act::before{content:'';position:absolute;left:0;top:2px;bottom:2px;width:2px;background:var(--blue);border-radius:0 2px 2px 0;}
.ni-i{width:13px;text-align:center;font-size:10px;flex-shrink:0;}
.ni-w{margin-left:auto;width:13px;height:13px;background:rgba(239,68,68,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7px;color:var(--red);}
.ss-nav{padding:7px;border-top:1px solid var(--bd);margin-top:auto;}
.si{display:flex;align-items:center;gap:5px;padding:4px 6px;border-radius:4px;cursor:pointer;font-size:9px;color:var(--t2);transition:all .12s;margin-bottom:1px;user-select:none;}
.si:hover{background:var(--bg3);color:var(--t1);}.si.act{background:rgba(6,182,212,.1);color:var(--cyan);}
.sd{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.sd.g{background:var(--green);}.sd.y{background:var(--yellow);}.sd.r{background:var(--red);animation:pr 1.5s infinite;}
@keyframes pr{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.3)}50%{box-shadow:0 0 0 3px rgba(239,68,68,0)}}

.ct{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;background:radial-gradient(ellipse at 20% 0%,rgba(59,130,246,.02) 0%,transparent 50%),var(--bg1);}

.card{background:var(--bg3);border:1px solid var(--bd);border-radius:10px;overflow:hidden;animation:fi .3s ease both;}
@keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
.ch{display:flex;align-items:center;justify-content:space-between;padding:8px 11px;border-bottom:1px solid var(--bd);}
.ct-t{font-size:10px;font-weight:600;display:flex;align-items:center;gap:4px;}
.ct-d{width:4px;height:4px;border-radius:50%;background:var(--cyan);}
.cbg{font-size:7px;padding:2px 5px;border-radius:8px;font-weight:600;}
.cbg.live{background:rgba(16,185,129,.1);color:var(--green);}.cbg.warn{background:rgba(245,158,11,.1);color:var(--yellow);}.cbg.info{background:rgba(59,130,246,.1);color:var(--blue);}.cbg.err{background:rgba(239,68,68,.1);color:var(--red);}
.cbd{padding:9px 11px;}
.ptb{display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.pt{font-size:14px;font-weight:700;}
.pbc{font-size:9px;color:var(--t3);margin-bottom:1px;}.pbc span{color:var(--cyan);}
.pa{display:flex;gap:4px;}
.btn-p{background:var(--gb);color:#fff;border:none;padding:4px 10px;border-radius:5px;font-size:9px;font-weight:500;transition:all .2s;box-shadow:0 1px 5px rgba(59,130,246,.2);}
.btn-p:hover{transform:translateY(-1px);}
.btn-o{background:transparent;color:var(--t2);border:1px solid var(--bd);padding:4px 10px;border-radius:5px;font-size:9px;transition:all .2s;}
.btn-o:hover{border-color:var(--blue);color:var(--blue);}
.btn-sm{padding:3px 6px;font-size:8px;border-radius:3px;border:1px solid var(--bd);background:none;color:var(--t2);transition:all .1s;}
.btn-sm:hover{border-color:var(--blue);color:var(--blue);}
.btn-sm.primary{background:var(--blue);color:#fff;border-color:var(--blue);}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.g21{display:grid;grid-template-columns:2fr 1fr;gap:10px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}

.ovc{background:var(--bg3);border:1px solid var(--bd);border-radius:10px;padding:9px;position:relative;overflow:hidden;transition:all .2s;}
.ovc:hover{border-color:var(--bd2);}
.ovc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.ovc.bl::before{background:var(--gb);}.ovc.gn::before{background:var(--gg);}.ovc.yl::before{background:var(--gy);}.ovc.rd::before{background:var(--gr);}.ovc.pp::before{background:linear-gradient(90deg,#8b5cf6,#a78bfa);}.ovc.cn::before{background:linear-gradient(90deg,#06b6d4,#22d3ee);}
.ov-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px;}
.ov-lb{font-size:8px;color:var(--t2);font-weight:500;}
.ov-ic{width:20px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:9px;}
.ov-ic.bl{background:rgba(59,130,246,.1);color:var(--blue);}.ov-ic.gn{background:rgba(16,185,129,.1);color:var(--green);}.ov-ic.yl{background:rgba(245,158,11,.1);color:var(--yellow);}.ov-ic.rd{background:rgba(239,68,68,.1);color:var(--red);}.ov-ic.pp{background:rgba(139,92,246,.1);color:var(--purple);}.ov-ic.cn{background:rgba(6,182,212,.1);color:var(--cyan);}
.ov-v{font-size:18px;font-weight:900;font-family:'JetBrains Mono',monospace;line-height:1;}
.ov-s{font-size:7px;color:var(--t3);margin-top:2px;}

.stb{width:100%;border-collapse:collapse;font-size:9px;}
.stb th{text-align:left;font-weight:600;color:var(--t3);padding:5px 6px;border-bottom:1px solid var(--bd);font-size:7px;letter-spacing:.5px;text-transform:uppercase;}
.stb td{padding:6px;border-bottom:1px solid rgba(30,45,74,.2);vertical-align:middle;}
.stb tr:hover td{background:rgba(59,130,246,.02);}
.sn{font-weight:500;color:var(--t1);}
.sid{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--cyan);opacity:.8;}
.sv{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:10px;}
.sv.n{color:var(--green);}.sv.w{color:var(--yellow);}.sv.d{color:var(--red);}
.sbar{width:50px;height:3px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden;display:inline-block;vertical-align:middle;}
.sbf{height:100%;border-radius:2px;}.sbf.g{background:var(--gg);}.sbf.y{background:var(--gy);}.sbf.r{background:var(--gr);}
.stag{font-size:7px;padding:1px 5px;border-radius:6px;font-weight:600;white-space:nowrap;}
.stag.n{background:rgba(16,185,129,.1);color:var(--green);}.stag.w{background:rgba(245,158,11,.1);color:var(--yellow);}.stag.d{background:rgba(239,68,68,.1);color:var(--red);}.stag.b{background:rgba(59,130,246,.1);color:var(--blue);}

.tabs{display:flex;gap:0;border-bottom:1px solid var(--bd);padding:0 10px;flex-wrap:wrap;}
.tab{padding:6px 9px;font-size:9px;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;transition:all .12s;font-weight:500;user-select:none;white-space:nowrap;}
.tab:hover{color:var(--t2);}.tab.act{color:var(--cyan);border-bottom-color:var(--cyan);}

.chip{padding:3px 8px;font-size:8px;border-radius:12px;border:1px solid var(--bd);background:var(--bg4);color:var(--t3);cursor:pointer;transition:all .12s;user-select:none;display:inline-block;}
.chip:hover{border-color:var(--blue);color:var(--t2);}
.chip.act{background:rgba(59,130,246,.12);border-color:var(--blue);color:var(--blue);font-weight:600;}

.cha{position:relative;border-radius:4px;overflow:hidden;background:linear-gradient(180deg,rgba(59,130,246,.01) 0%,transparent 100%);}
.cha svg{width:100%;height:100%;display:block;}
.ch-lb{display:flex;justify-content:space-between;padding:2px 2px 0;font-size:7px;color:var(--t3);font-family:'JetBrains Mono',monospace;}

.sev{width:8px;height:8px;border-radius:50%;display:inline-block;}.sev.r{background:var(--red);}.sev.y{background:var(--yellow);}.sev.g{background:var(--green);}

.hr-w{display:flex;align-items:center;justify-content:center;padding:6px 0;}
.hr{position:relative;}.hr svg{transform:rotate(-90deg);}
.hr-bg{fill:none;stroke:rgba(255,255,255,.04);stroke-width:5;}
.hr-f{fill:none;stroke-width:5;stroke-linecap:round;}
.hr-txt{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.hr-sc{font-weight:900;font-family:'JetBrains Mono',monospace;line-height:1;}
.hr-lb{font-size:7px;color:var(--t3);margin-top:1px;}

.sys-diagram{position:relative;background:var(--bg0);border-radius:10px;padding:14px;min-height:280px;border:1px solid var(--bd);overflow:hidden;}
.sys-node{position:absolute;background:var(--bg3);border:1px solid var(--bd);border-radius:8px;padding:7px 10px;cursor:pointer;transition:all .2s;text-align:center;z-index:2;min-width:70px;}
.sys-node:hover{border-color:var(--blue);transform:scale(1.03);box-shadow:0 0 14px rgba(59,130,246,.1);}
.sys-node .nd-icon{font-size:16px;margin-bottom:2px;}
.sys-node .nd-name{font-size:8px;font-weight:600;white-space:nowrap;}
.sys-node .nd-st{font-size:7px;margin-top:1px;display:flex;align-items:center;justify-content:center;gap:2px;}

.di{display:flex;align-items:flex-start;gap:6px;padding:6px;background:rgba(255,255,255,.015);border-radius:5px;border-left:2px solid transparent;margin-bottom:4px;}
.di.c{border-left-color:var(--red);}.di.w{border-left-color:var(--yellow);}.di.i{border-left-color:var(--blue);}
.di-ic{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;}
.di-ic.r{background:rgba(239,68,68,.1);color:var(--red);}.di-ic.y{background:rgba(245,158,11,.1);color:var(--yellow);}.di-ic.b{background:rgba(59,130,246,.1);color:var(--blue);}
.di-t{font-size:9px;font-weight:600;}.di-d{font-size:8px;color:var(--t2);line-height:1.3;}

.proc-steps{display:flex;align-items:center;gap:3px;margin:6px 0;flex-wrap:wrap;}
.proc-step{padding:4px 8px;background:var(--bg4);border-radius:5px;font-size:7px;color:var(--t3);border:1px solid var(--bd);white-space:nowrap;}
.proc-step.active{background:rgba(59,130,246,.1);border-color:var(--blue);color:var(--blue);}
.proc-step.done{background:rgba(16,185,129,.06);border-color:rgba(16,185,129,.15);color:var(--green);}
.proc-arrow{color:var(--t3);font-size:8px;}

.le{display:flex;align-items:flex-start;gap:6px;padding:4px 0;border-bottom:1px solid rgba(30,45,74,.2);font-size:9px;}
.le-t{font-family:'JetBrains Mono',monospace;font-size:7px;color:var(--t3);white-space:nowrap;min-width:48px;}
.le-d{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.le-d.g{background:var(--green);}.le-d.y{background:var(--yellow);}.le-d.r{background:var(--red);}.le-d.b{background:var(--blue);}
.le-m{color:var(--t2);line-height:1.3;}.le-m b{color:var(--t1);font-weight:500;}

.fmd-comp{background:rgba(255,255,255,.015);border-radius:6px;padding:8px;border:1px solid var(--bd);margin-bottom:6px;}
.fmd-title{font-size:8px;font-weight:600;color:var(--cyan);margin-bottom:4px;display:flex;justify-content:space-between;}

.lv-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:4px;font-size:7px;font-weight:700;}
.lv-0{background:rgba(16,185,129,.1);color:var(--green);}.lv-1{background:rgba(245,158,11,.1);color:var(--yellow);}.lv-2{background:rgba(239,68,68,.1);color:var(--red);}
</style>
</head>
<body>

<header class="hdr">
  <div class="logo"><div class="logo-i">H</div><div class="logo-t">机电复合传动系统健康管理与故障诊断平台</div></div>
  <div class="hdr-c"><div class="hdr-st"><div class="st-dot"></div>在线</div><div class="hdr-time" id="clock"></div></div>
  <div class="hdr-r"><span class="ver-tag">v3.2.1</span><button class="hdr-btn alrt">🔔 告警</button><button class="hdr-btn">📊 报表</button><button class="hdr-btn">⚙ 设置</button></div>
</header>
<div class="lay">
  <nav class="sb" id="sidebar">
    <div class="sb-s">
      <div class="sb-l">功能模块</div>
      <div class="ni act" data-page="home"><div class="ni-i">🏠</div>装备状态总览</div>
      <div class="ni" data-page="monitor"><div class="ni-i">🔍</div>状态监测与信号</div>
      <div class="ni" data-page="assess"><div class="ni-i">📊</div>状态评估</div>
      <div class="ni" data-page="anomaly"><div class="ni-i">⚡</div>异常报警<div class="ni-w">!</div></div>
      <div class="ni" data-page="diagnosis"><div class="ni-i">🧠</div>故障诊断<div class="ni-w">!</div></div>
      <div class="ni" data-page="siganalysis"><div class="ni-i">〰</div>信号分析</div>
      <div class="ni" data-page="decision"><div class="ni-i">💡</div>辅助决策</div>
      <div class="ni" data-page="maintenance"><div class="ni-i">🔧</div>维修事件管理</div>
      <div class="ni" data-page="log"><div class="ni-i">📝</div>系统日志</div>
    </div>
    <div class="ss-nav">
      <div class="sb-l">子系统导航</div>
      <div class="si act" data-sub="gen"><div class="sd g"></div>发电机</div>
      <div class="si" data-sub="hydraulic"><div class="sd y"></div>液压系统</div>
      <div class="si" data-sub="clutch"><div class="sd g"></div>离合器与制动器</div>
      <div class="si" data-sub="coupling"><div class="sd g"></div>功率耦合机构</div>
      <div class="si" data-sub="motorL"><div class="sd r"></div>左驱动电机</div>
      <div class="si" data-sub="motorR"><div class="sd g"></div>右驱动电机</div>
    </div>
  </nav>
  <main class="ct" id="mc"></main>
</div>

<script>
const SS={
  gen:{name:'发电机系统',icon:'⚡',health:85,hasMotor:true,
    signals:[
      {name:'发电机电压',id:'Gen_voltage',val:862,unit:'V',max:975,min:750,fault:'发电机过/欠压',rule:'>975V/<750V超2s',pct:68,st:'n'},
      {name:'电机绕组温度',id:'GCU_WindingTemp',val:186,unit:'°C',max:260,fault:'发电机过温',rule:'>260°C超2s',pct:72,st:'n'},
      {name:'发电机转矩',id:'Gen_torque',val:2340,unit:'N·m',max:2500,fault:'发电机过载',rule:'>2500N·m超2s',pct:94,st:'w'},
      {name:'GCU心跳',id:'EGen_Life',val:'OK',unit:'',max:'-',fault:'运行故障',rule:'心跳1s未更新',pct:20,st:'n'},
      {name:'GCU模块温度',id:'GCU_ModuleTemp',val:142,unit:'°C',max:260,fault:'发电机过温',rule:'>260°C超2s',pct:55,st:'n'},
      {name:'发电机转速',id:'GMot_Sep',val:3820,unit:'r/min',max:4300,fault:'发电机超速',rule:'>4300r/min超2s',pct:89,st:'n'},
      {name:'峰值相电流',id:'CGen_WireCurrent',val:724,unit:'A',max:900,fault:'发电机过流',rule:'>900A超2s',pct:80,st:'n'},
    ],
    vibs:[{name:'前传动主轴上方振动',axes:false},{name:'前传动主轴左侧振动',axes:false}],
    spdSig:'发电机转速 (GMot_Sep)',spdVal:3820,
    subH:{电气:92,热管理:88,机械:76,通讯:98},funcs:['发电功能','电压调节','散热功能'],funcSt:[1,1,1]},
  hydraulic:{name:'液压系统',icon:'💧',health:78,hasMotor:false,
    signals:[
      {name:'油泵电压',id:'BOilP_Voltage',val:845,unit:'V',max:975,fault:'油泵过/欠压',rule:'>975V/<750V超2s',pct:65,st:'n'},
      {name:'油泵转速',id:'AOilP_Spd',val:2800,unit:'r/min',max:3500,fault:'油泵超速',rule:'>3500超2s',pct:80,st:'n'},
      {name:'油泵温度',id:'EOilP_MotorTemp',val:95,unit:'°C',max:150,fault:'油泵过温',rule:'>150°C超2s',pct:63,st:'n'},

function hc(v){return v>=85?'var(--green)':v>=70?'var(--yellow)':'var(--red)';}
function rP(n,lo,hi){return Array.from({length:n},()=>lo+Math.random()*(hi-lo)).map(Math.round);}
function mkC(clr,pts,h=120){
  let d=`M0,${pts[0]}`;const s=600/(pts.length-1);for(let i=1;i<pts.length;i++)d+=` L${i*s},${pts[i]}`;
  return `<div class="cha" style="height:${h}px"><svg viewBox="0 0 600 ${h}" preserveAspectRatio="none"><line x1="0" y1="${h*.33}" x2="600" y2="${h*.33}" stroke="var(--bd)" stroke-width=".4" stroke-dasharray="3,3"/><line x1="0" y1="${h*.66}" x2="600" y2="${h*.66}" stroke="var(--bd)" stroke-width=".4" stroke-dasharray="3,3"/><path d="${d} L600,${h} L0,${h} Z" fill="${clr}" opacity=".06"/><path d="${d}" fill="none" stroke="${clr}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="600" cy="${pts[pts.length-1]}" r="2.5" fill="${clr}" stroke="var(--bg1)" stroke-width="1.5"><animate attributeName="r" values="2.5;4;2.5" dur="2s" repeatCount="indefinite"/></circle></svg></div>`;
}
function mkBar(pts,h=55,clr='var(--cyan)'){
  return `<div class="cha" style="height:${h}px"><svg viewBox="0 0 600 ${h}" preserveAspectRatio="none">${pts.map((v,i)=>{const bw=600/pts.length*.75;const x=i*(600/pts.length)+600/pts.length*.125;return `<rect x="${x}" y="${h-v}" width="${bw}" height="${v}" fill="${v>h*.7?'var(--yellow)':clr}" opacity="${v>h*.6?.8:.5}" rx="1"/>`;}).join('')}</svg></div>`;
}
function mkSpec(){
  const C=['rgba(10,14,26,.9)','rgba(6,182,212,.1)','rgba(6,182,212,.22)','rgba(59,130,246,.22)','rgba(59,130,246,.4)','rgba(245,158,11,.3)','rgba(245,158,11,.5)','rgba(239,68,68,.3)'];
  let h='<div style="height:70px;border-radius:4px;overflow:hidden;display:grid;grid-template-columns:repeat(48,1fr);grid-template-rows:repeat(12,1fr);gap:1px;background:var(--bg0);">';
  for(let i=0;i<576;i++){const c=i%48,r=Math.floor(i/48);let v=Math.random()*.2;if(r===3||r===4)v+=.3+Math.sin(c*.2)*.2;if(r===7||r===8)v+=.2+Math.sin(c*.15+1)*.15;v+=c/48*.1;v=Math.min(v,1);h+=`<div style="background:${C[Math.floor(v*(C.length-1))]};border-radius:1px;"></div>`;}
  return h+'</div>';
}
function mkRing(score,sz=85){
  const r=sz/2-7,circ=2*Math.PI*r,off=circ*(1-score/100),col=hc(score);
  return `<div class="hr-w"><div class="hr" style="width:${sz}px;height:${sz}px"><svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}"><circle class="hr-bg" cx="${sz/2}" cy="${sz/2}" r="${r}"/><circle class="hr-f" cx="${sz/2}" cy="${sz/2}" r="${r}" stroke="${col}" stroke-dasharray="${circ}" stroke-dashoffset="${off}"/></svg><div class="hr-txt"><div class="hr-sc" style="color:${col};font-size:${sz/5}px">${score}</div><div class="hr-lb">健康</div></div></div></div>`;
}

}

        </div>

        <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;padding:6px;background:rgba(255,255,255,.02);border-radius:5px;border:1px solid var(--bd);">
          <span style="font-size:8px;color:var(--t2)">时变转速？</span>
          <span class="chip ${sigTimeVar?'':'act'}" onclick="sigTimeVar=false;nav()">否</span>
          <span class="chip ${sigTimeVar?'act':''}" onclick="sigTimeVar=true;nav()">是</span>
          ${sigTimeVar?'<span style="font-size:7px;color:var(--orange)">→角域重采样</span>':''}
        </div>
        ${sigTimeVar?`<div style="font-size:9px;font-weight:600;color:var(--orange);margin-bottom:4px">角域重采样</div><div class="g2" style="margin-bottom:8px;"><div><div style="font-size:8px;color:var(--t2);margin-bottom:2px">去噪后信号</div>${mkC('var(--teal)',rP(20,12,70),45)}</div><div><div style="font-size:8px;color:var(--t2);margin-bottom:2px">角域重采样后</div>${mkC('var(--green)',rP(20,15,65),45)}</div></div>`:''}

        <div style="font-size:9px;font-weight:600;color:var(--cyan);margin-bottom:4px">频谱分析算法</div>
        <div style="display:flex;gap:3px;margin-bottom:8px;">
          <span class="chip ${sigAlgo==='hilbert'?'act':''}" onclick="sigAlgo='hilbert';nav()">希尔伯特变换</span>
          <span class="chip ${sigAlgo==='eemd'?'act':''}" onclick="sigAlgo='eemd';nav()">集成经验模态分解</span>
          <span class="chip ${sigAlgo==='fmd'?'act':''}" onclick="sigAlgo='fmd';nav()">特征模式分解</span>
        </div>

        ${sigAlgo==='hilbert'?`<div class="g2">
          <div><div style="font-size:8px;color:var(--t2);margin-bottom:2px">原始信号</div>${mkC('var(--blue)',rP(25,10,80),55)}</div>
          <div><div style="font-size:8px;color:var(--t2);margin-bottom:2px">Hilbert包络特征</div>${mkC('var(--orange)',rP(25,5,50).map((v,i)=>i%5===0?50:v),55)}</div>
        </div>`:''}

        ${sigAlgo==='eemd'?`<div style="font-size:8px;color:var(--t2);margin-bottom:3px">EEMD本征模式分量 (IMF)</div>
        ${[1,2,3].map(i=>`<div class="fmd-comp"><div class="fmd-title"><span>IMF ${i}</span></div><div class="g2"><div>${mkC(['var(--blue)','var(--purple)','var(--teal)'][i-1],rP(20,15+i*5,65-i*5),35)}<div style="font-size:7px;color:var(--t3);text-align:center">分量波形</div></div><div>${mkBar(rP(35,2,Math.max(10,45-i*10)).map((v,j)=>j===4?45-i*8:v),35,'var(--orange)')}<div style="font-size:7px;color:var(--t3);text-align:center">包络特征</div></div></div></div>`).join('')}`:''}

        ${sigAlgo==='fmd'?`<div style="font-size:8px;color:var(--t2);margin-bottom:3px">FMD特征模式分量</div>
        ${[1,2,3,4].map(i=>`<div class="fmd-comp"><div class="fmd-title"><span>FMD分量 ${i}</span><span style="font-size:6px;color:var(--t3)">f=${[125,340,680,1250][i-1]}Hz</span></div><div class="g2"><div>${mkC(['var(--blue)','var(--purple)','var(--teal)','var(--orange)'][i-1],rP(20,18+i*3,65-i*5),35)}<div style="font-size:7px;color:var(--t3);text-align:center">分量波形</div></div><div>${mkBar(rP(35,2,Math.max(10,50-i*8)).map((v,j)=>j===4&&i<3?48-i*8:v),35)}<div style="font-size:7px;color:var(--t3);text-align:center">包络谱</div></div></div></div>`).join('')}
        <div style="padding:4px;background:rgba(245,158,11,.04);border:1px solid rgba(245,158,11,.08);border-radius:4px;font-size:7px;color:var(--t2);margin-top:4px;"><b style="color:var(--yellow)">提示：</b>FMD分量1/2在BPFI处检出包络峰值，疑似轴承内圈缺陷。</div>`:''}
      </div>`:`
      <div class="cbd">
        <div style="font-size:9px;font-weight:600;color:var(--blue);margin-bottom:6px">基于FFT的电流频谱分析</div>
        <div class="g2">
          <div><div style="font-size:8px;color:var(--t2);margin-bottom:2px">原始电流信号</div>${mkC('var(--blue)',rP(25,15,85),65)}<div class="ch-lb"><span>0s</span><span>0.5s</span><span>1.0s</span></div></div>
          <div><div style="font-size:8px;color:var(--t2);margin-bottom:2px">FFT频谱</div>${mkBar(rP(50,2,45).map((v,i)=>i===2?55:i===5?35:i===10?25:v),65,'var(--blue)')}<div class="ch-lb"><span>0Hz</span><span>100</span><span>200</span><span>300</span><span>400</span><span>500</span></div></div>
        </div>
        <div style="padding:4px;background:rgba(59,130,246,.04);border:1px solid rgba(59,130,246,.08);border-radius:4px;font-size:7px;color:var(--t2);margin-top:6px;"><b style="color:var(--blue)">分析：</b>主频50Hz基波正常，谐波分量未见明显异常特征。</div>
      </div>`}
    </div>`;
  }

  return `<div class="ptb"><div><div class="pbc">信号分析 / <span>${s.name}</span></div><div class="pt">${s.name} — 信号分析</div></div><div class="pa"><button class="btn-p">📥 导出</button></div></div>
  <div class="card"><div class="ch"><div class="ct-t"><div class="ct-d"></div>数据加载</div></div><div class="cbd">
    <div style="display:flex;flex-wrap:wrap;gap:5px;align-items:center;">
      <div style="display:flex;align-items:center;gap:3px;"><label style="font-size:8px;color:var(--t2)">传感器/信号</label><select onchange="sigType=this.options[this.selectedIndex].value;sigLoaded=false;nav()">${sensorOpts}</select></div>
      <div style="display:flex;align-items:center;gap:3px;"><label style="font-size:8px;color:var(--t2)">${axisLabel}</label><select>${axisOpts}</select></div>
      <div style="display:flex;align-items:center;gap:3px;"><span style="font-size:8px;color:var(--t2)">转速: </span><span style="font-size:8px;font-family:'JetBrains Mono';color:var(--cyan)">${s.spdSig||'N/A'} = ${s.spdVal} r/min</span></div>
      <button class="btn-p" onclick="sigLoaded=true;nav()">📂 加载数据</button>
      ${sigLoaded?'<span style="font-size:7px;color:var(--green)">✓ 已加载</span>':''}
    </div>
  </div></div>
  ${loadedContent}`;
}

function pgDecision(){
  return `<div class="ptb"><div><div class="pt">辅助决策</div></div><div class="pa"><button class="btn-p">🧠 生成建议</button></div></div>
  <div class="card"><div class="ch"><div class="ct-t"><div class="ct-d"></div>决策列表</div><div style="display:flex;gap:3px;"><select style="font-size:8px;padding:2px 5px;"><option>全部</option><option>高</option><option>中</option><option>低</option></select></div></div>
  <div class="cbd" style="padding:0"><table class="stb"><thead><tr><th>ID</th><th>告警</th><th>部件</th><th>故障</th><th>优先级</th><th>建议</th><th>状态</th><th>操作</th></tr></thead><tbody>${DECISIONS.map(d=>`<tr><td><span class="sid">${d.id}</span></td><td><span class="sid">${d.aid}</span></td><td class="sn">${d.comp}</td><td style="font-size:7px;color:var(--t2);max-width:100px">${d.fault}</td><td><span class="stag ${d.lv==='h'?'d':d.lv==='m'?'w':'b'}">${d.lv==='h'?'高':d.lv==='m'?'中':'低'}</span></td><td style="font-size:7px;color:var(--t2);max-width:150px">${d.sug}</td><td><span class="stag ${d.status==='待执行'?'d':d.status==='执行中'?'w':'n'}">${d.status}</span></td><td><button class="btn-sm primary">执行</button></td></tr>`).join('')}</tbody></table></div></div>
  <div class="g2">
    <div class="card"><div class="ch"><div class="ct-t"><div class="ct-d"></div>效果追踪</div></div><div class="cbd">${mkC('var(--green)',rP(12,35,100),70)}<div class="ch-lb"><span>1月</span><span>2月</span><span>3月</span></div></div></div>
    <div class="card"><div class="ch"><div class="ct-t"><div class="ct-d"></div>统计</div></div><div class="cbd"><div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;">${[{n:'待执行',v:1,c:'var(--red)'},{n:'待审批',v:1,c:'var(--yellow)'},{n:'执行中',v:1,c:'var(--blue)'},{n:'已排期',v:1,c:'var(--green)'}].map(m=>`<div style="background:rgba(255,255,255,.02);border-radius:4px;padding:8px;text-align:center;border:1px solid var(--bd);"><div style="font-size:7px;color:var(--t3)">${m.n}</div><div style="font-family:'JetBrains Mono';font-size:16px;font-weight:900;color:${m.c}">${m.v}</div></div>`).join('')}</div></div></div>
  </div>`;
}

function pgMaintenance(){
  return `<div class="ptb"><div><div class="pt">维修事件管理</div></div><div class="pa"><button class="btn-p">+ 创建工单</button></div></div>
  <div class="g4">
    <div class="ovc gn"><div class="ov-top"><div class="ov-lb">已完成</div><div class="ov-ic gn">✓</div></div><div class="ov-v" style="color:var(--green)">${MAINTS.filter(m=>m.status==='已完成').length}</div></div>
    <div class="ovc yl"><div class="ov-top"><div class="ov-lb">进行中</div><div class="ov-ic yl">⏳</div></div><div class="ov-v" style="color:var(--yellow)">${MAINTS.filter(m=>m.status==='进行中').length}</div></div>
    <div class="ovc bl"><div class="ov-top"><div class="ov-lb">已排期</div><div class="ov-ic bl">📅</div></div><div class="ov-v" style="color:var(--blue)">${MAINTS.filter(m=>m.status==='已排期').length}</div></div>
    <div class="ovc pp"><div class="ov-top"><div class="ov-lb">均工时</div><div class="ov-ic pp">⏱</div></div><div class="ov-v" style="color:var(--purple)">4.2<span style="font-size:8px;color:var(--t3)">h</span></div></div>
  </div>
  <div class="card"><div class="ch"><div class="ct-t"><div class="ct-d"></div>工单</div><div style="display:flex;gap:3px;"><select style="font-size:8px;padding:2px 5px;"><option>全部状态</option><option>已完成</option><option>进行中</option><option>已排期</option></select></div></div>
  <div class="cbd" style="padding:0"><table class="stb"><thead><tr><th>工单号</th><th>内容</th><th>组件</th><th>负责人</th><th>日期</th><th>状态</th><th>操作</th></tr></thead><tbody>${MAINTS.map(m=>`<tr><td><span class="sid">${m.id}</span></td><td class="sn">${m.title}</td><td style="font-size:8px;color:var(--t2)">${m.comp}</td><td style="font-size:8px;color:var(--t2)">${m.tech}</td><td style="font-size:7px;font-family:'JetBrains Mono';color:var(--t3)">${m.date}</td><td><span class="stag ${m.status==='已完成'?'n':m.status==='进行中'?'w':'b'}">${m.status}</span></td><td><button class="btn-sm">查看</button></td></tr>`).join('')}</tbody></table></div></div>`;
}

function pgLog(){
  const s=SS[curSub];const logs=[];const types=['采样','诊断','异常','心跳','归档','决策','阈值','振动'];
  for(let i=0;i<18;i++){const t=types[i%8];const isW=i===1||i===2;logs.push({time:`${String(14-Math.floor(i/3)).padStart(2,'0')}:${String(Math.floor(Math.random()*60)).padStart(2,'0')}`,dot:isW?'y':i%4===0?'b':'g',msg:`<b>${t}</b> · ${s.name} · ${isW?'预警':'正常'}`});}
  return `<div class="ptb"><div><div class="pt">系统日志</div></div><div class="pa"><button class="btn-p">📥 导出</button></div></div>
  <div class="g4">
    <div class="ovc bl"><div class="ov-top"><div class="ov-lb">今日</div><div class="ov-ic bl">📝</div></div><div class="ov-v" style="color:var(--blue)">2847</div></div>
    <div class="ovc gn"><div class="ov-top"><div class="ov-lb">正常</div><div class="ov-ic gn">✓</div></div><div class="ov-v" style="color:var(--green)">2831</div></div>
    <div class="ovc yl"><div class="ov-top"><div class="ov-lb">预警</div><div class="ov-ic yl">⚠</div></div><div class="ov-v" style="color:var(--yellow)">13</div></div>
    <div class="ovc rd"><div class="ov-top"><div class="ov-lb">告警</div><div class="ov-ic rd">🔴</div></div><div class="ov-v" style="color:var(--red)">3</div></div>
  </div>
  <div class="card"><div class="ch"><div class="ct-t"><div class="ct-d"></div>日志流</div><div class="cbg live">● 实时</div></div>
    <div class="tabs"><div class="tab act">全部</div><div class="tab">告警</div><div class="tab">预警</div><div class="tab">系统</div></div>
    <div class="cbd">${logs.map(l=>`<div class="le"><div class="le-t">${l.time}</div><div class="le-d ${l.dot}"></div><div class="le-m">${l.msg}</div></div>`).join('')}</div>
  </div>`;
}

// ROUTER
const pages={home:pgHome,monitor:pgMonitor,assess:pgAssess,anomaly:pgAnomaly,diagnosis:pgDiagnosis,siganalysis:pgSigAnalysis,decision:pgDecision,maintenance:pgMaintenance,log:pgLog};
function nav(){document.getElementById('mc').innerHTML=pages[curPage]();document.getElementById('mc').scrollTop=0;}

window.goSub=function(sub){curSub=sub;sigLoaded=false;diagPPRun=false;diagRun=false;document.querySelectorAll('.si').forEach(s=>s.classList.toggle('act',s.dataset.sub===sub));nav();};
window.genDec=function(){curPage='decision';document.querySelectorAll('.ni').forEach(n=>n.classList.toggle('act',n.dataset.page==='decision'));nav();};

document.getElementById('sidebar').addEventListener('click',e=>{
  const ni=e.target.closest('.ni[data-page]'),si=e.target.closest('.si[data-sub]');
  if(ni){document.querySelectorAll('.ni').forEach(n=>n.classList.remove('act'));ni.classList.add('act');curPage=ni.dataset.page;sigLoaded=false;diagPPRun=false;diagRun=false;nav();}
  if(si){document.querySelectorAll('.si').forEach(s=>s.classList.remove('act'));si.classList.add('act');curSub=si.dataset.sub;sigLoaded=false;diagPPRun=false;diagRun=false;nav();}
});

setInterval(()=>{const n=new Date();document.getElementById('clock').textContent=`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')} ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')}`;},1000);
nav();
</script>
</body>
</html>
